# .streamlit/secrets.toml
# ========================
# NSE Pro Trader — API Keys & Secrets
# ⚠️  NEVER commit this file to GitHub. Add to .gitignore.
#
# HOW TO USE:
#   Local  : Save as  .streamlit/secrets.toml  in the same folder as the app
#   Railway: Add each key in Railway dashboard → Variables
#   Render : Add each key in Render dashboard → Environment
# ================================================================


# ── ZERODHA KITE CONNECT (Required for live data + trading) ────
# Free Personal API: https://developers.kite.trade
# Steps:
#   1. Go to https://developers.kite.trade → Sign in with Zerodha
#   2. Click "Create New App" → Select "Personal" (FREE)
#   3. App name: anything | Redirect URL: http://localhost:8501
#      (or your Railway/Render URL for cloud deployment)
#   4. Copy API Key and API Secret below
#
KITE_API_KEY    = "your_api_key_here"
KITE_API_SECRET = "your_api_secret_here"
#
# DAILY LOGIN (30 seconds each morning):
#   1. Open app → sidebar → click "Login Zerodha" link
#   2. Complete login + 2FA
#   3. Copy request_token from redirect URL
#      URL looks like: http://localhost:8501?request_token=XXXXXX&status=success
#   4. Paste in sidebar → click Connect
#   ✅ Done for the day. Token auto-expires at midnight.
# ================================================================


# ── ANTHROPIC CLAUDE API (Optional — AI Sentiment analysis) ────
# Free $5 credits on signup: https://console.anthropic.com
# Cost for your app: ~₹0.25 per full 15-stock scan
# Steps:
#   1. Go to https://console.anthropic.com
#   2. Settings → API Keys → Create Key
#   3. Copy the sk-ant-... key below
#
ANTHROPIC_API_KEY = "sk-ant-your-key-here"
# ================================================================


# ── TELEGRAM BOT (Optional — Signal alerts to your phone) ──────
# Free. Takes 3 minutes to set up.
# Steps:
#   1. Open Telegram → search @BotFather
#   2. Send /newbot → follow prompts → copy the token (looks like: 7123456:ABC...)
#   3. Start a chat with your new bot (open it and send /start)
#   4. Visit this URL to get your chat ID:
#      https://api.telegram.org/bot<YOUR_TOKEN>/getUpdates
#      Find "chat": {"id": 123456789} — that number is your CHAT_ID
#
TELEGRAM_TOKEN   = "7123456789:ABCdefGHIjklMNOpqrSTUvwxYZ"
TELEGRAM_CHAT_ID = "123456789"
# ================================================================
